<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semangat Puasa Aljainudin!</title>
    <style>
        body {
            background-color: #ffe5ec;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            z-index: 10;
        }

        h1 { color: #fb6f92; margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; }
        
        .btn {
            background-color: #fb6f92;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover { background-color: #ff8fab; }

        .hidden { display: none; }

        /* Animasi Hati Terbang */
        .heart {
            position: absolute;
            color: #fb6f92;
            font-size: 20px;
            animation: float 5s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="btn" onclick="startSurprise()">Klik untuk Aljainudin ❤️</button>
    </div>

    <div id="content" class="container hidden">
        <h1>Semangat Puasanya!</h1>
        <p>Halo <b>Aljainudin</b> sayang...</p>
        <p>Jangan lemes ya puasanya hari ini. Tetap semangat ibadahnya sampai adzan maghrib nanti!</p>
        <p><i>"Semoga berkah setiap detiknya."</i></p>
        <hr style="border: 0.5px solid #eee">
        <p style="font-size: 0.9em;">Dari: <b>Alin</b> ❤️</p>
    </div>

    <audio id="mySong" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startSurprise() {
            // Sembunyikan tombol, munculkan konten
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            
            // Putar Lagu
            var audio = document.getElementById('mySong');
            audio.play();

            // Buat efek hati terbang
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
